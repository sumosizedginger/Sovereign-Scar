name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Pin a Chrome build explicitly rather than guessing where the runner
      # image preinstalled one (that path drifts across image updates and
      # broke this workflow once already). The harness (tests/harness.mjs
      # findChrome) honors CHROME_PATH.
      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run full suite (unit specs + browser smoke test)
        run: npm test
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
