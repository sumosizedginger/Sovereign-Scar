<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sovereign Scar — The Wound That Remembers</title>
    <link rel="icon" href="data:,">
    <style>
        html, body {
            margin: 0;
            height: 100%;
            background: #0a0c12;
            overflow: hidden;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
        #boot {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: #cfe0f0;
            z-index: 5;
            pointer-events: none;
            background: radial-gradient(ellipse at center, #1a1c28 0%, #0a0c12 70%);
            transition: opacity 0.6s ease;
        }
        #boot h1 {
            font-weight: 600;
            letter-spacing: 0.12em;
            font-size: 1.4rem;
            color: #7fe0ff;
            margin: 0 0 0.4rem;
        }
        #boot p {
            margin: 0;
            color: #8a96a8;
            font-size: 0.85rem;
        }
        #boot .sigil {
            color: #d4a84b;
            margin-top: 0.75rem;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "./lib/three/three.module.min.js",
            "three/addons/": "./lib/three/addons/"
        }
    }
    </script>
</head>
<body>
    <div id="boot">
        <h1>SOVEREIGN SCAR</h1>
        <p>The Wound That Remembers</p>
        <p class="sigil">√π ⊗ ∞ ⊗ τ²</p>
        <p style="margin-top:1.2rem;opacity:0.7">Click or press any key · loading…</p>
    </div>
    <script type="module">
        const boot = document.getElementById('boot');

        function showFatal(title, detail) {
            if (!boot) return;
            boot.style.pointerEvents = 'auto';
            boot.style.padding = '2rem';
            boot.style.boxSizing = 'border-box';
            boot.innerHTML = '';
            const heading = document.createElement('h1');
            heading.textContent = title;
            const message = document.createElement('p');
            message.textContent = detail;
            message.style.maxWidth = '42rem';
            message.style.textAlign = 'center';
            message.style.lineHeight = '1.6';
            boot.append(heading, message);
        }

        function supportsWebGL2() {
            try {
                const canvas = document.createElement('canvas');
                return !!window.WebGL2RenderingContext && !!canvas.getContext('webgl2');
            } catch (_) {
                return false;
            }
        }

        if (!supportsWebGL2()) {
            showFatal(
                'WEBGL2 REQUIRED',
                'Sovereign Scar needs WebGL2. Enable hardware acceleration or open the game in a current Chrome, Edge, Firefox, or Safari browser.'
            );
        } else {
            import('./src/game/index.js').then(() => {
                // Fade the boot overlay once the first frame has likely painted.
                setTimeout(() => {
                    if (boot) {
                        boot.style.opacity = '0';
                        setTimeout(() => boot.remove(), 700);
                    }
                }, 900);
            }).catch((error) => {
                console.error(error);
                showFatal(
                    'THE SCAR FAILED TO OPEN',
                    'The game could not start. Reload once. If it fails again, check the browser console for the exact error.'
                );
            });
        }
    </script>
</body>
</html>
